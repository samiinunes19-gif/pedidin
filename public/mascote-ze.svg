<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="white">
  <!-- Cabeça -->
  <ellipse cx="100" cy="110" rx="70" ry="75" fill="white"/>
  <!-- Cabelo/topo -->
  <ellipse cx="100" cy="50" rx="50" ry="30" fill="white"/>
  <!-- Óculos escuros - lente esquerda -->
  <ellipse cx="65" cy="100" rx="28" ry="20" fill="#1a1a1a"/>
  <!-- Óculos escuros - lente direita -->
  <ellipse cx="135" cy="100" rx="28" ry="20" fill="#1a1a1a"/>
  <!-- Ponte dos óculos -->
  <rect x="90" y="95" width="20" height="8" fill="#1a1a1a"/>
  <!-- Brilho nos óculos esquerdo -->
  <ellipse cx="55" cy="92" rx="8" ry="5" fill="#333"/>
  <!-- Brilho nos óculos direito -->
  <ellipse cx="125" cy="92" rx="8" ry="5" fill="#333"/>
  <!-- Nariz -->
  <ellipse cx="100" cy="130" rx="8" ry="12" fill="#f0f0f0"/>
  <!-- Sorriso/Barba -->
  <path d="M 60 150 Q 100 175 140 150" stroke="#e0e0e0" stroke-width="4" fill="none"/>
  <!-- Barba stubble área -->
  <ellipse cx="100" cy="160" rx="35" ry="20" fill="#f5f5f5"/>
</svg>
