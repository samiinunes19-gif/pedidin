<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cabeça -->
  <ellipse cx="100" cy="100" rx="70" ry="80" fill="#1a1a1a"/>
  
  <!-- Óculos - armação -->
  <rect x="35" y="70" width="55" height="35" rx="10" fill="#333333"/>
  <rect x="110" y="70" width="55" height="35" rx="10" fill="#333333"/>
  <rect x="90" y="80" width="20" height="8" fill="#333333"/>
  
  <!-- Óculos - lentes -->
  <rect x="40" y="75" width="45" height="25" rx="7" fill="#555555"/>
  <rect x="115" y="75" width="45" height="25" rx="7" fill="#555555"/>
  
  <!-- Brilho nos óculos -->
  <ellipse cx="55" cy="82" rx="8" ry="5" fill="#777777" opacity="0.5"/>
  <ellipse cx="130" cy="82" rx="8" ry="5" fill="#777777" opacity="0.5"/>
  
  <!-- Nariz -->
  <ellipse cx="100" cy="115" rx="8" ry="6" fill="#333333"/>
  
  <!-- Sorriso/Barba -->
  <path d="M 60 140 Q 100 170 140 140" stroke="#333333" stroke-width="8" fill="none" stroke-linecap="round"/>
